apiVersion: v2
name: my-full-app
description: A Helm chart for Todo application with full stack
version: 0.1.0
appVersion: "1.0"
dependencies:
  - name: prometheus
    version: 19.7.2
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: 6.57.3
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled